<!DOCTYPE html>
<html>
	<head>
		<title>task</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
		<link rel ="stylesheet" href ="./assests/css/style.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	</head>
	<body>
		<div class="container-fluid mt-5">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="card">
						<div class="card-body">
							<form action="" id="inputform">
								<div class="form-group">
									<label for="name" class="font-weight-bold">Name*</label>
									<input type="text" required class="form-control" id="name">
								</div>
								<div class="form-group">
									<label for="email" class="font-weight-bold">Email*</label>
									<input type="text" required class="form-control" id="email">
								</div>
								<div class="form-group">
									<label for="body" class="font-weight-bold">Comment*</label>
									<textarea class="form-control" required rows="4" id="body"></textarea>
								</div>
								<div class="form-group">
									<label for="userId" class="font-weight-bold">UserId*</label>
									<input type="number" class="form-control" id="userId">
								</div>
								<button class="btn btn-sm btn-block btn-primary" id="Addcomment">Add Comment</button>
								<button type="button" class="d-none btn btn-sm btn-block btn-success" id="Updatecomment">Update Comment</button>

							</form>
						</div>
					</div>
				</div>
			</div>
			<div class="row mt-5" id="cardcontainer">
				
			</div>
		</div>
		<div class="spinner d-none" id="spinner">
			<div class="spinner-border text-warning" role="status">
  				<span class="sr-only">Loading...</span>
			</div>
		</div>

		
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
		<script src="./assests/js/app.js"></script>
	</body>
</html>
